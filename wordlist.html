<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中国語単語一覧</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: linear-gradient(135deg, #fff8e1 0%, #ffe0b2 100%);
    min-height: 100vh;
    padding: 16px;
    color: #001858;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 1.6rem;
    margin-bottom: 16px;
    color: #001858;
  }
  .lesson-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .lesson-btn {
    flex: 1;
    min-width: 70px;
    padding: 10px 12px;
    border: 2px solid #e65100;
    background: #fff;
    color: #e65100;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lesson-btn.active {
    background: #ff9800;
    color: #fff;
    border-color: #ff9800;
  }
  .search-box {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #ffcc80;
    border-radius: 12px;
    font-size: 1rem;
    margin-bottom: 16px;
    font-family: inherit;
    background: #fff;
  }
  .search-box:focus {
    outline: none;
    border-color: #ff9800;
  }
  .summary {
    text-align: center;
    font-size: 0.9rem;
    color: #555;
    margin-bottom: 12px;
  }
  .lesson-section {
    margin-bottom: 24px;
  }
  .lesson-header {
    background: #ff9800;
    color: #fff;
    padding: 10px 16px;
    border-radius: 12px 12px 0 0;
    font-size: 1.1rem;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .word-table {
    background: #fff;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(230, 81, 0, 0.1);
  }
  .word-row {
    display: grid;
    grid-template-columns: 1.5fr 1.5fr 2fr 50px;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid #fff3e0;
    gap: 8px;
    transition: background 0.15s;
  }
  .word-row:last-child { border-bottom: none; }
  .word-row:hover { background: #fff8e1; }
  .word-row.header {
    background: #fff3e0;
    font-weight: bold;
    font-size: 0.8rem;
    color: #e65100;
    position: sticky;
    top: 0;
    z-index: 5;
  }
  .col-hanzi {
    font-size: 1.15rem;
    font-weight: bold;
    color: #001858;
    word-break: break-all;
  }
  .col-pinyin {
    font-size: 0.95rem;
    color: #d81b60;
    font-weight: 500;
    word-break: break-all;
  }
  .col-meaning {
    font-size: 0.9rem;
    color: #444;
    line-height: 1.4;
  }
  .audio-btn {
    background: #ff9800;
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(255, 152, 0, 0.4);
    justify-self: center;
    transition: transform 0.1s;
  }
  .audio-btn:active { transform: scale(0.88); }
  .audio-btn.playing {
    background: #d81b60;
    animation: pulse 0.8s infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .no-results {
    text-align: center;
    padding: 40px;
    color: #999;
    font-size: 1rem;
  }
  .speed-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
    align-items: center;
  }
  .speed-label {
    font-size: 0.85rem;
    color: #555;
    margin-right: 4px;
  }
  .speed-btn {
    padding: 6px 14px;
    border: 2px solid #ffcc80;
    background: #fff;
    color: #e65100;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .speed-btn.active { background: #ffcc80; }

  /* スマホ用レイアウト */
  @media (max-width: 600px) {
    body { padding: 10px; }
    h1 { font-size: 1.3rem; }
    .word-row {
      grid-template-columns: 1fr 44px;
      grid-template-rows: auto auto auto;
      gap: 4px;
      padding: 12px;
    }
    .word-row.header { display: none; }
    .col-hanzi {
      grid-column: 1;
      grid-row: 1;
      font-size: 1.2rem;
    }
    .audio-btn {
      grid-column: 2;
      grid-row: 1 / span 3;
      align-self: center;
    }
    .col-pinyin {
      grid-column: 1;
      grid-row: 2;
      font-size: 0.9rem;
    }
    .col-meaning {
      grid-column: 1;
      grid-row: 3;
      font-size: 0.85rem;
      color: #555;
    }
  }
</style>
</head>
<body>
<div class="container">
  <h1>📚 中国語単語一覧</h1>

  <div class="lesson-selector">
    <button class="lesson-btn active" data-lesson="all">全課</button>
    <button class="lesson-btn" data-lesson="1">第1課</button>
    <button class="lesson-btn" data-lesson="2">第2課</button>
    <button class="lesson-btn" data-lesson="3">第3課</button>
  </div>

  <input type="text" class="search-box" id="search" placeholder="🔍 簡体字・ピンイン・日本語で検索...">

  <div class="speed-bar">
    <span class="speed-label">読み上げ速度:</span>
    <button class="speed-btn" data-speed="0.6">遅い</button>
    <button class="speed-btn active" data-speed="0.85">普通</button>
    <button class="speed-btn" data-speed="1.0">速い</button>
  </div>

  <div class="summary" id="summary"></div>

  <div id="content"></div>
</div>

let currentLesson = "all";
let speed = 0.85;
let chineseVoice = null;
let voicesLoaded = false;
let currentPlayingBtn = null;

function loadChineseVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) return false;
  const preferredOrder = [
    v => v.lang === "zh-CN",
    v => v.lang === "zh_CN",
    v => v.lang.toLowerCase().startsWith("cmn"),
    v => v.lang.toLowerCase().startsWith("zh-hans"),
    v => v.lang.toLowerCase().startsWith("zh"),
  ];
  for (const matcher of preferredOrder) {
    const found = voices.find(matcher);
    if (found) {
      chineseVoice = found;
      voicesLoaded = true;
      return true;
    }
  }
  voicesLoaded = true;
  return false;
}

function playWord(text, btn) {
  if (!('speechSynthesis' in window)) {
    alert("お使いのブラウザは音声合成に対応していません。");
    return;
  }
  if (!voicesLoaded) loadChineseVoice();
  if (!chineseVoice) loadChineseVoice();
  if (!chineseVoice) {
    alert("中国語の音声が見つかりません。\n端末の設定から中国語(中文/简体)の音声データをインストールしてください。");
    return;
  }
  // 直前の再生をキャンセル
  window.speechSynthesis.cancel();
  if (currentPlayingBtn) currentPlayingBtn.classList.remove("playing");

  const cleanText = text.replace(/[~〜～()（）]/g, "");
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.voice = chineseVoice;
  utterance.lang = chineseVoice.lang;
  utterance.rate = speed;
  utterance.pitch = 1.0;

  btn.classList.add("playing");
  currentPlayingBtn = btn;
  utterance.onend = () => {
    btn.classList.remove("playing");
    if (currentPlayingBtn === btn) currentPlayingBtn = null;
  };
  utterance.onerror = () => {
    btn.classList.remove("playing");
    if (currentPlayingBtn === btn) currentPlayingBtn = null;
  };
  window.speechSynthesis.speak(utterance);
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

function render() {
  const searchTerm = document.getElementById("search").value.trim().toLowerCase();
  const lessonsToShow = currentLesson === "all" ? ["1", "2", "3"] : [currentLesson];
  const content = document.getElementById("content");
  let totalCount = 0;
  let html = "";

  lessonsToShow.forEach(lesson => {
    const words = data[lesson].filter(w => {
      if (!searchTerm) return true;
      return w.h.toLowerCase().includes(searchTerm) ||
             w.p.toLowerCase().includes(searchTerm) ||
             w.j.toLowerCase().includes(searchTerm);
    });
    if (words.length === 0) return;
    totalCount += words.length;

    html += `<div class="lesson-section">`;
    html += `<div class="lesson-header"><span>第${lesson}課</span><span>${words.length}語</span></div>`;
    html += `<div class="word-table">`;
    html += `<div class="word-row header"><div>簡体字</div><div>ピンイン</div><div>日本語訳</div><div>音声</div></div>`;
    words.forEach((w, i) => {
      html += `<div class="word-row">
        <div class="col-hanzi">${escapeHtml(w.h)}</div>
        <div class="col-pinyin">${escapeHtml(w.p)}</div>
        <div class="col-meaning">${escapeHtml(w.j)}</div>
        <button class="audio-btn" data-text="${escapeHtml(w.h)}">🔊</button>
      </div>`;
    });
    html += `</div></div>`;
  });

  if (totalCount === 0) {
    html = `<div class="no-results">該当する単語が見つかりませんでした</div>`;
    document.getElementById("summary").textContent = "";
  } else {
    document.getElementById("summary").textContent = `全 ${totalCount} 語${searchTerm ? `（"${searchTerm}" で検索中）` : ""}`;
  }
  content.innerHTML = html;

  // 音声ボタンのイベントを登録
  content.querySelectorAll(".audio-btn").forEach(btn => {
    btn.addEventListener("click", () => playWord(btn.dataset.text, btn));
  });
}

document.querySelectorAll(".lesson-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    currentLesson = btn.dataset.lesson;
    document.querySelectorAll(".lesson-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

document.getElementById("search").addEventListener("input", render);

document.querySelectorAll(".speed-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    speed = parseFloat(btn.dataset.speed);
    document.querySelectorAll(".speed-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

// 音声リスト読み込み
if ('speechSynthesis' in window) {
  loadChineseVoice();
  window.speechSynthesis.onvoiceschanged = () => loadChineseVoice();
  window.speechSynthesis.getVoices();
  setTimeout(loadChineseVoice, 500);
  setTimeout(loadChineseVoice, 1500);
}

render();
</script>
</body>
</html>
