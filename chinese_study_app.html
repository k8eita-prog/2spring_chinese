<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中国語学習アプリ</title>
<style>
  /*
    脳科学的記憶定着配色:
    - 背景: ベージュ #FAF7F0 (オフホワイト) — 目の疲労軽減、長時間学習向け
    - メイン暖色: 黄系 #F4B400 (アンバー) — 記憶想起促進、ノルアドレナリン刺激
    - サブ寒色: 青系 #1A73E8 (ディープブルー) — 集中力向上、副交感神経活性
    - アクセント赤: #D93025 — 重要情報の強調、ドーパミン放出
    - 文字: #1F2937 (チャコール) — 高コントラストで認識性確保
    - 成功色: #34A853 (グリーン) — 達成感
  */
  :root {
    --bg-main: #FAF7F0;
    --bg-card: #FFFFFF;
    --bg-section: #FFF9E6;
    --color-primary: #F4B400;
    --color-primary-dark: #D49500;
    --color-secondary: #1A73E8;
    --color-secondary-dark: #1557B0;
    --color-accent: #D93025;
    --color-success: #34A853;
    --color-text: #1F2937;
    --color-text-sub: #5F6368;
    --color-border: #E8E2D0;
    --shadow-card: 0 4px 12px rgba(31, 41, 55, 0.08);
    --shadow-elevated: 0 8px 24px rgba(31, 41, 55, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { overscroll-behavior-x: none; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: var(--bg-main);
    min-height: 100vh;
    padding: 12px;
    color: var(--color-text);
    line-height: 1.5;
  }
  .container { max-width: 900px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 1.5rem;
    margin-bottom: 12px;
    color: var(--color-text);
    font-weight: 700;
  }

  /* キーボードヒント */
  .keyboard-hint {
    text-align: center;
    font-size: 0.75rem;
    color: var(--color-text-sub);
    margin-bottom: 12px;
    padding: 6px;
    background: var(--bg-section);
    border-radius: 8px;
    border: 1px solid var(--color-border);
  }
  .kbd {
    display: inline-block;
    padding: 1px 6px;
    background: #fff;
    border: 1px solid var(--color-border);
    border-radius: 4px;
    font-family: monospace;
    font-size: 0.7rem;
    box-shadow: 0 1px 0 var(--color-border);
    margin: 0 2px;
  }

  /* モード切替タブ */
  .mode-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 16px;
    background: var(--bg-card);
    padding: 6px;
    border-radius: 16px;
    box-shadow: var(--shadow-card);
  }
  .mode-tab {
    flex: 1;
    padding: 12px 8px;
    border: none;
    background: transparent;
    color: var(--color-text-sub);
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-tab.active {
    background: var(--color-secondary);
    color: #fff;
    box-shadow: 0 2px 8px rgba(26, 115, 232, 0.3);
  }
  .mode-tab:hover:not(.active) { background: var(--bg-section); }

  /* 整頓した操作バー */
  .control-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 10px;
    align-items: center;
  }
  .lesson-select, .speed-select {
    padding: 10px 12px;
    border: 2px solid var(--color-secondary);
    background: var(--bg-card);
    color: var(--color-secondary);
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='12'%20height='12'%20viewBox='0%200%2012%2012'%3E%3Cpath%20fill='%231A73E8'%20d='M2%204l4%204%204-4z'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 28px;
  }
  .lesson-select { flex: 1; }

  /* 課選択ボタン + チェックボックスパネル */
  .lesson-trigger {
    flex: 1;
    padding: 10px 12px;
    border: 2px solid var(--color-secondary);
    background: var(--bg-card);
    color: var(--color-secondary);
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lesson-trigger:hover { background: #E8F0FE; }
  .lesson-panel {
    display: none;
    background: var(--bg-card);
    border: 2px solid var(--color-secondary);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-elevated);
  }
  .lesson-panel.open { display: block; }
  .lesson-panel-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--color-text);
    flex-wrap: wrap;
    gap: 8px;
  }
  .lesson-panel-quick { display: flex; gap: 6px; }
  .quick-btn {
    padding: 5px 12px;
    border: 1.5px solid var(--color-border);
    background: var(--bg-card);
    color: var(--color-secondary);
    border-radius: 14px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
  }
  .quick-btn:hover { border-color: var(--color-secondary); }
  .lesson-checkboxes {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 12px;
  }
  .lesson-check {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px 6px;
    border: 2px solid var(--color-border);
    background: var(--bg-card);
    color: var(--color-text);
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }
  .lesson-check:hover { border-color: var(--color-secondary); }
  .lesson-check.checked {
    background: var(--color-secondary);
    color: #fff;
    border-color: var(--color-secondary);
  }
  .lesson-panel-done {
    width: 100%;
    padding: 12px;
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
  }
  .lesson-panel-done:hover { background: var(--color-primary-dark); }
  @media (max-width: 600px) {
    .lesson-checkboxes { grid-template-columns: repeat(3, 1fr); }
  }
  .speed-select {
    border-color: var(--color-primary);
    color: var(--color-primary-dark);
    background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='12'%20height='12'%20viewBox='0%200%2012%2012'%3E%3Cpath%20fill='%23D49500'%20d='M2%204l4%204%204-4z'/%3E%3C/svg%3E");
  }
  .lesson-select:focus, .speed-select:focus { outline: none; }
  .control-bar .toggle-btn {
    padding: 10px 12px;
    font-size: 1rem;
    border-radius: 10px;
    flex-shrink: 0;
  }

  /* 課切替（旧） */
  .lesson-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .lesson-btn {
    flex: 1;
    min-width: 70px;
    padding: 10px 12px;
    border: 2px solid var(--color-secondary);
    background: var(--bg-card);
    color: var(--color-secondary);
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .lesson-btn:hover { background: #E8F0FE; }
  .lesson-btn.active {
    background: var(--color-secondary);
    color: #fff;
  }

  /* オプションバー */
  .options-bar {
    display: flex;
    gap: 12px;
    justify-content: center;
    margin-bottom: 16px;
    align-items: center;
    flex-wrap: wrap;
    padding: 10px;
    background: var(--bg-card);
    border-radius: 12px;
    box-shadow: var(--shadow-card);
  }
  .option-group {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .option-label {
    font-size: 0.8rem;
    color: var(--color-text-sub);
    font-weight: 600;
  }
  .opt-btn {
    padding: 6px 12px;
    border: 1.5px solid var(--color-border);
    background: var(--bg-card);
    color: var(--color-text);
    border-radius: 16px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .opt-btn:hover { border-color: var(--color-primary); }
  .opt-btn.active {
    background: var(--color-primary);
    color: #fff;
    border-color: var(--color-primary);
  }
  .toggle-btn {
    padding: 6px 12px;
    border: 1.5px solid var(--color-border);
    background: var(--bg-card);
    color: var(--color-text-sub);
    border-radius: 16px;
    font-size: 0.78rem;
    cursor: pointer;
  }
  .toggle-btn.on {
    background: var(--color-success);
    color: #fff;
    border-color: var(--color-success);
  }

  /* モード別表示制御 */
  .mode-content { display: none; }
  .mode-content.active { display: block; }

  /* === 単語一覧モード === */
  .search-box {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--color-border);
    border-radius: 12px;
    font-size: 1rem;
    margin-bottom: 12px;
    font-family: inherit;
    background: var(--bg-card);
    color: var(--color-text);
  }
  .search-box:focus { outline: none; border-color: var(--color-secondary); }
  .summary {
    text-align: center;
    font-size: 0.85rem;
    color: var(--color-text-sub);
    margin-bottom: 12px;
  }
  .lesson-section { margin-bottom: 20px; }
  .lesson-header {
    background: var(--color-secondary);
    color: #fff;
    padding: 10px 16px;
    border-radius: 12px 12px 0 0;
    font-size: 1rem;
    font-weight: 600;
    display: flex;
    justify-content: space-between;
  }
  .word-table {
    background: var(--bg-card);
    border-radius: 0 0 12px 12px;
    overflow: hidden;
    box-shadow: var(--shadow-card);
  }
  .word-row {
    display: grid;
    grid-template-columns: 1.5fr 1.5fr 2fr 80px;
    align-items: center;
    padding: 12px 14px;
    border-bottom: 1px solid var(--color-border);
    gap: 8px;
    transition: background 0.12s;
  }
  .word-row:last-child { border-bottom: none; }
  .word-row:hover { background: var(--bg-section); }
  .word-row.header {
    background: var(--bg-section);
    font-weight: 600;
    font-size: 0.75rem;
    color: var(--color-text-sub);
  }
  .word-row.starred { background: #FFFBEB; }
  .word-row.status-ng { background: #FDEDED; border-left: 4px solid var(--color-accent); }
  .word-row.status-maybe { background: #FFF8E1; border-left: 4px solid var(--color-primary); }
  .word-row.status-ok { background: #E8F5E9; border-left: 4px solid var(--color-success); }
  .col-hanzi {
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--color-text);
    word-break: break-all;
  }
  .col-pinyin {
    font-size: 0.95rem;
    color: var(--color-secondary);
    font-weight: 500;
    word-break: break-all;
  }
  .col-meaning {
    font-size: 0.88rem;
    color: var(--color-text-sub);
  }
  .col-actions {
    display: flex;
    gap: 4px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  .status-buttons {
    display: flex;
    gap: 2px;
  }
  .status-btn {
    width: 28px;
    height: 28px;
    border: 2px solid var(--color-border);
    background: var(--bg-card);
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0;
    transition: all 0.15s;
  }
  .status-btn:hover { transform: scale(1.1); }
  .status-btn.active.ng { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }
  .status-btn.active.maybe { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
  .status-btn.active.ok { background: var(--color-success); border-color: var(--color-success); color: #fff; }

  /* ステータスフィルタータブ */
  .status-filter {
    display: flex;
    gap: 6px;
    margin-bottom: 12px;
    background: var(--bg-card);
    padding: 6px;
    border-radius: 14px;
    box-shadow: var(--shadow-card);
    overflow-x: auto;
  }
  .status-filter-btn {
    flex: 1;
    min-width: 0;
    padding: 8px 4px;
    border: none;
    background: transparent;
    color: var(--color-text-sub);
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 4px;
  }
  .status-filter-btn:hover { background: var(--bg-section); }
  .status-filter-btn .count {
    font-size: 0.72rem;
    color: var(--color-text-sub);
    background: var(--bg-section);
    padding: 1px 7px;
    border-radius: 8px;
    font-weight: 700;
  }
  .status-filter-btn.active.all { background: var(--color-secondary); color: #fff; }
  .status-filter-btn.active.ng { background: var(--color-accent); color: #fff; }
  .status-filter-btn.active.maybe { background: var(--color-primary); color: #fff; }
  .status-filter-btn.active.ok { background: var(--color-success); color: #fff; }
  .status-filter-btn.active.new { background: #6B7280; color: #fff; }
  .status-filter-btn.active .count { background: rgba(255,255,255,0.25); color: #fff; }

  /* カード上のステータスバッジ */
  .card-status-buttons {
    position: absolute;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .card-status-btn {
    padding: 8px 14px;
    border: 2px solid var(--color-border);
    background: var(--bg-card);
    border-radius: 16px;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .card-status-btn.active.ng { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }
  .card-status-btn.active.maybe { background: var(--color-primary); border-color: var(--color-primary); color: #fff; }
  .card-status-btn.active.ok { background: var(--color-success); border-color: var(--color-success); color: #fff; }
  .icon-btn {
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.1s;
  }
  .icon-btn:active { transform: scale(0.88); }
  .icon-btn.playing {
    background: var(--color-accent);
    animation: pulse 0.8s infinite;
  }
  .star-btn {
    background: transparent;
    color: var(--color-border);
    font-size: 1.3rem;
    width: 30px;
    height: 30px;
  }
  .star-btn.starred { color: var(--color-primary); }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1); }
  }
  .no-results {
    text-align: center;
    padding: 40px;
    color: var(--color-text-sub);
  }

  /* === フラッシュカードモード === */
  .progress {
    text-align: center;
    margin-bottom: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--color-text);
  }
  .progress-bar {
    width: 100%;
    height: 6px;
    background: var(--color-border);
    border-radius: 3px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--color-secondary), var(--color-primary));
    transition: width 0.3s;
  }

  .card-container {
    perspective: 1000px;
    margin-bottom: 16px;
    touch-action: pan-y;
  }
  .card {
    position: relative;
    width: 100%;
    min-height: 400px;
    transform-style: preserve-3d;
    transition: transform 0.6s;
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.swipe-left { transform: translateX(-100%) rotate(-10deg); opacity: 0; transition: all 0.3s; }
  .card.swipe-right { transform: translateX(100%) rotate(10deg); opacity: 0; transition: all 0.3s; }
  .card-face {
    position: absolute;
    width: 100%;
    min-height: 400px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    border-radius: 20px;
    padding: 24px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    box-shadow: var(--shadow-elevated);
    background: var(--bg-card);
  }
  .card-front { border-top: 6px solid var(--color-primary); }
  .card-back {
    border-top: 6px solid var(--color-secondary);
    transform: rotateY(180deg);
    justify-content: flex-start;
    overflow-y: auto;
  }
  .hanzi {
    font-size: 3rem;
    font-weight: 700;
    text-align: center;
    color: var(--color-text);
    line-height: 1.3;
    word-break: break-all;
  }
  .hint {
    margin-top: 20px;
    font-size: 0.8rem;
    color: var(--color-text-sub);
  }
  .pinyin-big {
    font-size: 1.5rem;
    color: var(--color-secondary);
    font-weight: 600;
    text-align: center;
    margin-bottom: 8px;
    width: 100%;
  }
  .meaning {
    font-size: 1.1rem;
    color: var(--color-text);
    text-align: center;
    margin-bottom: 16px;
    padding-bottom: 16px;
    border-bottom: 2px dashed var(--color-border);
    width: 100%;
    font-weight: 500;
  }
  .example-label {
    font-size: 0.7rem;
    color: var(--color-text-sub);
    margin-bottom: 6px;
    align-self: flex-start;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
  }
  .example-hanzi { font-size: 1.05rem; color: var(--color-text); margin-bottom: 4px; line-height: 1.5; }
  .example-pinyin { font-size: 0.9rem; color: var(--color-secondary); margin-bottom: 4px; line-height: 1.5; }
  .example-jp { font-size: 0.88rem; color: var(--color-text-sub); line-height: 1.5; }
  .card-audio-btn {
    background: var(--color-primary);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    font-size: 1rem;
    cursor: pointer;
    margin-left: 8px;
    vertical-align: middle;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  }
  .card-audio-btn:active { transform: scale(0.92); }
  .card-star {
    position: absolute;
    top: 12px;
    right: 12px;
    background: transparent;
    border: none;
    font-size: 1.6rem;
    color: var(--color-border);
    cursor: pointer;
    z-index: 10;
  }
  .card-star.starred { color: var(--color-primary); }

  .controls {
    display: flex;
    gap: 8px;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .ctrl-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    background: var(--color-secondary);
    color: #fff;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .ctrl-btn:hover { background: var(--color-secondary-dark); }
  .ctrl-btn:active { transform: scale(0.97); }
  .ctrl-btn:disabled { background: var(--color-border); cursor: not-allowed; color: var(--color-text-sub); }

  .secondary-controls {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }
  .sec-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid var(--color-primary);
    background: var(--bg-card);
    color: var(--color-primary-dark);
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  .sec-btn:hover { background: #FFF9E6; }

  /* === テストモード === */
  .test-card {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 12px;
    box-shadow: var(--shadow-elevated);
    border-top: 6px solid var(--color-success);
    min-height: 420px;
  }
  .stage-label {
    font-size: 0.75rem;
    color: var(--color-text-sub);
    font-weight: 600;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .big-play-btn {
    display: block;
    margin: 12px auto 20px;
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: var(--color-secondary);
    color: #fff;
    border: none;
    font-size: 2.4rem;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(26, 115, 232, 0.3);

  }
  .big-play-btn:hover { background: var(--color-secondary-dark); }
  .big-play-btn:active { transform: scale(0.93); }
  .big-play-btn.playing { background: var(--color-accent); animation: pulse 0.8s infinite; }

  .input-area { margin-bottom: 16px; }
  .input-label {
    font-size: 0.85rem;
    color: var(--color-text);
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
  }
  .answer-input {
    width: 100%;
    padding: 12px;
    border: 2px solid var(--color-border);
    border-radius: 10px;
    font-size: 1.05rem;
    margin-bottom: 12px;
    font-family: inherit;
    background: var(--bg-card);
    color: var(--color-text);
  }
  .answer-input:focus { outline: none; border-color: var(--color-secondary); }
  .reveal-btn {
    width: 100%;
    padding: 14px;
    background: var(--color-success);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .reveal-btn:hover { background: #2D8E45; }
  .answer-area {
    background: var(--bg-section);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    display: none;
  }
  .answer-area.shown { display: block; }
  .answer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--color-border);
  }
  .answer-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .answer-label {
    font-size: 0.72rem;
    color: var(--color-text-sub);
    flex-shrink: 0;
    margin-right: 12px;
    font-weight: 600;
    text-transform: uppercase;
  }
  .answer-value {
    font-size: 1.05rem;
    color: var(--color-text);
    font-weight: 600;
    text-align: right;
    flex: 1;
    word-break: break-all;
  }
  .answer-value.pinyin { color: var(--color-secondary); }
  .answer-value.hanzi { font-size: 1.4rem; }
  .judge-buttons {
    display: none;
    gap: 8px;
    margin-bottom: 12px;
  }
  .judge-buttons.shown { display: flex; }
  .judge-btn {
    flex: 1;
    padding: 16px 8px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
  }
  .judge-correct { background: var(--color-success); color: #fff; }
  .judge-wrong { background: var(--color-accent); color: #fff; }
  .judge-btn:active { transform: scale(0.96); }
  .meaning-display {
    text-align: center;
    color: var(--color-text-sub);
    font-size: 0.85rem;
    margin-top: 8px;
    font-style: italic;
  }
  .score-display {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-bottom: 8px;
    font-size: 0.9rem;
  }
  .score-item {
    background: var(--bg-card);
    padding: 6px 14px;
    border-radius: 16px;
    box-shadow: var(--shadow-card);
  }
  .score-correct { color: var(--color-success); font-weight: 700; }
  .score-wrong { color: var(--color-accent); font-weight: 700; }

  /* スワイプインジケーター */
  .swipe-indicator {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 2rem;
    color: var(--color-primary);
    opacity: 0;
    transition: opacity 0.15s;
    pointer-events: none;
    z-index: 20;
  }
  .swipe-indicator.left { left: 20px; }
  .swipe-indicator.right { right: 20px; }
  .swipe-indicator.show { opacity: 0.8; }

  @media (max-width: 600px) {
    body { padding: 8px; }
    h1 { font-size: 1.25rem; }
    .keyboard-hint { display: none; }
    .mode-tab { font-size: 0.78rem; padding: 10px 4px; }
    .hanzi { font-size: 2.4rem; }
    .pinyin-big { font-size: 1.25rem; }
    .big-play-btn { width: 90px; height: 90px; font-size: 2rem; }
    .answer-value.hanzi { font-size: 1.2rem; }
    .word-row {
      grid-template-columns: 1fr 84px;
      grid-template-rows: auto auto auto;
      gap: 4px;
      padding: 12px;
    }
    .word-row.header { display: none; }
    .col-hanzi { grid-column: 1; grid-row: 1; font-size: 1.15rem; }
    .col-actions { grid-column: 2; grid-row: 1 / span 3; align-self: center; }
    .col-pinyin { grid-column: 1; grid-row: 2; font-size: 0.9rem; }
    .col-meaning { grid-column: 1; grid-row: 3; font-size: 0.82rem; }
    .options-bar { gap: 8px; padding: 8px; }
    .option-label { font-size: 0.72rem; }
    .opt-btn, .toggle-btn { font-size: 0.72rem; padding: 5px 9px; }
    .status-filter-btn { min-width: 60px; font-size: 0.72rem; padding: 6px 4px; }
    .card-status-btn { padding: 6px 10px; font-size: 0.72rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>🇨🇳 中国語学習アプリ</h1>

  <!-- キーボードショートカット案内（PCのみ） -->
  <div class="keyboard-hint">
    ⌨️ <span class="kbd">←</span><span class="kbd">→</span>移動 / <span class="kbd">Space</span>裏返し / <span class="kbd">P</span>発音 / <span class="kbd">S</span>シャッフル / <span class="kbd">F</span>★ / <span class="kbd">1/2/3</span>モード / <span class="kbd">Q</span>覚えてない <span class="kbd">W</span>怪しい <span class="kbd">E</span>完璧
  </div>

  <!-- モード切替タブ -->
  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="list">📚 単語一覧</button>
    <button class="mode-tab" data-mode="flashcard">🎴 フラッシュカード</button>
    <button class="mode-tab" data-mode="test">🎧 リスニングテスト</button>
  </div>

  <!-- 整頓した操作バー: 課選択ボタン + 速度 + オプション -->
  <div class="control-bar">
    <button class="lesson-trigger" id="lesson-trigger">📚 全課 ▾</button>
    <select class="speed-select" id="speed-select">
      <option value="0.6">🐢 遅い</option>
      <option value="0.85" selected>▶ 普通</option>
      <option value="1.0">🐇 速い</option>
    </select>
    <button class="toggle-btn" id="toggle-starred">⭐</button>
    <button class="toggle-btn" id="toggle-autoplay" style="display:none;">🔄</button>
  </div>

  <!-- 課選択パネル（チェックボックス式・複数選択可） -->
  <div class="lesson-panel" id="lesson-panel">
    <div class="lesson-panel-head">
      <span>勉強する課を選ぶ（複数可）</span>
      <div class="lesson-panel-quick">
        <button class="quick-btn" id="lesson-all">全課</button>
        <button class="quick-btn" id="lesson-clear">クリア</button>
      </div>
    </div>
    <div class="lesson-checkboxes" id="lesson-checkboxes"></div>
    <button class="lesson-panel-done" id="lesson-done">決定</button>
  </div>

  <!-- 習熟度セグメントバー -->
  <div class="status-filter" id="status-filter">
    <button class="status-filter-btn active all" data-status="all" title="一覧（すべて）">📋<span class="count" id="cnt-all">0</span></button>
    <button class="status-filter-btn new" data-status="new" title="未学習">🆕<span class="count" id="cnt-new">0</span></button>
    <button class="status-filter-btn ng" data-status="ng" title="覚えてない">❌<span class="count" id="cnt-ng">0</span></button>
    <button class="status-filter-btn maybe" data-status="maybe" title="怪しい">⚠️<span class="count" id="cnt-maybe">0</span></button>
    <button class="status-filter-btn ok" data-status="ok" title="完璧">✅<span class="count" id="cnt-ok">0</span></button>
  </div>

  <!-- ========== 単語一覧モード ========== -->
  <div class="mode-content active" id="mode-list">
    <input type="text" class="search-box" id="search" placeholder="🔍 簡体字・ピンイン・日本語で検索...">
    <div class="summary" id="summary"></div>
    <div id="list-content"></div>
  </div>

  <!-- ========== フラッシュカードモード ========== -->
  <div class="mode-content" id="mode-flashcard">
    <div class="progress" id="fc-progress">1 / 1</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="fc-progress-bar" style="width:0%"></div></div>
    <div class="card-container" id="fc-container">
      <div class="swipe-indicator left" id="swipe-left">←</div>
      <div class="swipe-indicator right" id="swipe-right">→</div>
      <div class="card" id="card">
        <button class="card-star" id="fc-star" onclick="event.stopPropagation(); toggleStar()">☆</button>
        <div class="card-face card-front">
          <div class="hanzi" id="front-hanzi">―</div>
          <button class="card-audio-btn" onclick="event.stopPropagation(); playFcAudio('front')">🔊</button>
          <div class="hint">タップで裏返す / スワイプで移動</div>
        </div>
        <div class="card-face card-back">
          <div class="pinyin-big" id="back-pinyin">―</div>
          <div class="meaning" id="back-meaning">―</div>
          <div class="example-label">例文</div>
          <div class="example-hanzi" id="back-ex-hanzi">―
            <button class="card-audio-btn" onclick="event.stopPropagation(); playFcAudio('back')">🔊</button>
          </div>
          <div class="example-pinyin" id="back-ex-pinyin">―</div>
          <div class="example-jp" id="back-ex-jp">―</div>
        </div>
      </div>
    </div>
    <!-- フラッシュカード用ステータス設定ボタン -->
    <div class="secondary-controls" style="margin-bottom: 12px;">
      <button class="card-status-btn ng" data-status="ng">❌ 覚えてない (Q)</button>
      <button class="card-status-btn maybe" data-status="maybe">⚠️ 怪しい (W)</button>
      <button class="card-status-btn ok" data-status="ok">✅ 完璧 (E)</button>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="fc-prev">← 前へ</button>
      <button class="ctrl-btn" id="fc-next">次へ →</button>
    </div>
    <div class="secondary-controls">
      <button class="sec-btn" id="fc-shuffle">🔀 シャッフル</button>
      <button class="sec-btn" id="fc-reset">↺ 最初から</button>
    </div>
  </div>

  <!-- ========== テストモード ========== -->
  <div class="mode-content" id="mode-test">
    <div class="progress" id="test-progress">1 / 1</div>
    <div class="progress-bar"><div class="progress-bar-fill" id="test-progress-bar" style="width:0%"></div></div>
    <div class="score-display">
      <div class="score-item">✓ <span class="score-correct" id="score-correct">0</span></div>
      <div class="score-item">✗ <span class="score-wrong" id="score-wrong">0</span></div>
      <div class="score-item">📊 <span id="score-rate">0%</span></div>
    </div>
    <div class="test-card">
      <div class="stage-label">🔊 音声を聞いて書き取ろう</div>
      <button class="big-play-btn" id="test-play">▶</button>
      <div class="input-area">
        <label class="input-label">📝 簡体字</label>
        <input type="text" class="answer-input" id="input-hanzi" placeholder="聞こえた中国語を入力...">
        <label class="input-label">📝 ピンイン</label>
        <input type="text" class="answer-input" id="input-pinyin" placeholder="例: ni hao または nǐ hǎo">
      </div>
      <button class="reveal-btn" id="reveal-btn">答えを見る (Space)</button>
      <div class="answer-area" id="answer-area">
        <div class="answer-row">
          <span class="answer-label">簡体字</span>
          <span class="answer-value hanzi" id="ans-hanzi">―</span>
        </div>
        <div class="answer-row">
          <span class="answer-label">ピンイン</span>
          <span class="answer-value pinyin" id="ans-pinyin">―</span>
        </div>
        <div class="answer-row">
          <span class="answer-label">日本語訳</span>
          <span class="answer-value" id="ans-meaning">―</span>
        </div>
        <div class="meaning-display" id="ans-example">―</div>
      </div>
      <div class="judge-buttons" id="judge-buttons">
        <button class="judge-btn judge-wrong" id="wrong-btn">✗ 不正解 (W)</button>
        <button class="judge-btn judge-correct" id="correct-btn">✓ 正解 (C)</button>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="test-prev">← 前へ</button>
      <button class="ctrl-btn" id="test-next">次へ →</button>
    </div>
    <div class="secondary-controls">
      <button class="sec-btn" id="test-shuffle">🔀 シャッフル</button>
      <button class="sec-btn" id="test-reset">↺ スコアリセット</button>
    </div>
  </div>
</div>

<script>
// ========== データ ==========
const data = {
  1: [
    {h:"山田太郎",p:"Shāntián Tàiláng",j:"山田太郎",eh:"我叫山田太郎，是日本人。",ep:"Wǒ jiào Shāntián Tàiláng, shì Rìběnrén.",ej:"私は山田太郎、日本人です。"},
    {h:"所",p:"suǒ",j:"（建物などを数える）",eh:"我家附近有两所学校。",ep:"Wǒ jiā fùjìn yǒu liǎng suǒ xuéxiào.",ej:"家の近くに学校が2つあります。"},
    {h:"为了",p:"wèile",j:"〜のために",eh:"为了学好汉语，我去中国留学。",ep:"Wèile xuéhǎo Hànyǔ, wǒ qù Zhōngguó liúxué.",ej:"中国語を習得するため、中国に留学します。"},
    {h:"尽快",p:"jǐnkuài",j:"なるべく早く",eh:"请你尽快回复我。",ep:"Qǐng nǐ jǐnkuài huífù wǒ.",ej:"なるべく早く返信してください。"},
    {h:"提高",p:"tígāo",j:"高める、向上させる",eh:"我想提高我的汉语水平。",ep:"Wǒ xiǎng tígāo wǒ de Hànyǔ shuǐpíng.",ej:"中国語のレベルを上げたいです。"},
    {h:"自己",p:"zìjǐ",j:"自分",eh:"这件事我自己来做。",ep:"Zhè jiàn shì wǒ zìjǐ lái zuò.",ej:"この件は自分でやります。"},
    {h:"水平",p:"shuǐpíng",j:"レベル",eh:"他的汉语水平很高。",ep:"Tā de Hànyǔ shuǐpíng hěn gāo.",ej:"彼の中国語のレベルは高いです。"},
    {h:"打算",p:"dǎsuan",j:"〜するつもりだ",eh:"我打算明年去中国。",ep:"Wǒ dǎsuan míngnián qù Zhōngguó.",ej:"来年中国に行くつもりです。"},

// ========== ローカルストレージ管理 ==========
const STORAGE_KEY = "chinese_study_app_v2";
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch (e) { return null; }
}
function saveState() {
  const state = {
    starred: Array.from(starred),
    speed: speed,
    autoplay: autoplay,
    scoreData: scoreData,
    wordStatus: wordStatus,
    lastMode: currentMode,
    selectedLessons: selectedLessons
  };
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

const saved = loadState() || {};
let starred = new Set(saved.starred || []);
let scoreData = saved.scoreData || { correct: 0, wrong: 0, perWord: {} };
let speed = saved.speed || 0.85;
let autoplay = saved.autoplay || false;
let showStarredOnly = false;
// 単語ステータス管理 ("ng" / "maybe" / "ok")
let wordStatus = saved.wordStatus || {};
// フィルター状態 ("all" / "new" / "ng" / "maybe" / "ok")
let statusFilter = "all";

function getStatus(id) { return wordStatus[id] || null; }
function setStatus(id, status) {
  if (status === null) delete wordStatus[id];
  else wordStatus[id] = status;
  saveState();
  updateStatusCounts();
}

// ========== 共通: 音声合成 ==========
let chineseVoice = null;
let voicesLoaded = false;
let currentPlayingBtn = null;

function loadChineseVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) return false;
  const preferredOrder = [
    v => v.lang === "zh-CN",
    v => v.lang === "zh_CN",
    v => v.lang.toLowerCase().startsWith("cmn"),
    v => v.lang.toLowerCase().startsWith("zh-hans"),
    v => v.lang.toLowerCase().startsWith("zh"),
  ];
  for (const matcher of preferredOrder) {
    const found = voices.find(matcher);
    if (found) {
      chineseVoice = found;
      voicesLoaded = true;
      return true;
    }
  }
  voicesLoaded = true;
  return false;
}

function speak(text, btn, onEndCallback) {
  if (!('speechSynthesis' in window)) return;
  if (!voicesLoaded) loadChineseVoice();
  if (!chineseVoice) loadChineseVoice();
  if (!chineseVoice) {
    alert("中国語の音声が見つかりません。端末の設定から中国語の音声データをインストールしてください。");
    return;
  }
  window.speechSynthesis.cancel();
  if (currentPlayingBtn) currentPlayingBtn.classList.remove("playing");

  const cleanText = text.replace(/[~〜～()（）]/g, "");
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.voice = chineseVoice;
  utterance.lang = chineseVoice.lang;
  utterance.rate = speed;
  utterance.pitch = 1.0;

  if (btn) {
    btn.classList.add("playing");
    currentPlayingBtn = btn;
  }
  utterance.onend = () => {
    if (btn) btn.classList.remove("playing");
    if (currentPlayingBtn === btn) currentPlayingBtn = null;
    if (onEndCallback) onEndCallback();
  };
  utterance.onerror = () => {
    if (btn) btn.classList.remove("playing");
    if (currentPlayingBtn === btn) currentPlayingBtn = null;
  };
  window.speechSynthesis.speak(utterance);
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// ========== モード管理 ==========
let currentMode = saved.lastMode || "list";

// 全課番号（dataのキーから動的取得、昇順）
const ALL_LESSONS = Object.keys(data).sort((a, b) => Number(a) - Number(b));

// 選択中の課（複数選択可）。保存値があれば復元、なければ全課。
let selectedLessons = (saved.selectedLessons && saved.selectedLessons.length)
  ? saved.selectedLessons.filter(l => ALL_LESSONS.includes(l))
  : [...ALL_LESSONS];
if (selectedLessons.length === 0) selectedLessons = [...ALL_LESSONS];

// 課トリガーボタンのラベルを更新
function updateLessonTriggerLabel() {
  const btn = document.getElementById("lesson-trigger");
  const sorted = [...selectedLessons].sort((a, b) => Number(a) - Number(b));
  if (sorted.length === ALL_LESSONS.length) {
    btn.textContent = "📚 全課 ▾";
  } else if (sorted.length === 1) {
    btn.textContent = `📖 第${sorted[0]}課 ▾`;
  } else {
    btn.textContent = `📖 第${sorted.join("・")}課 ▾`;
  }
}

// チェックボックスパネルを描画
function renderLessonCheckboxes() {
  const container = document.getElementById("lesson-checkboxes");
  container.innerHTML = "";
  ALL_LESSONS.forEach(l => {
    const div = document.createElement("div");
    div.className = "lesson-check" + (selectedLessons.includes(l) ? " checked" : "");
    div.dataset.lesson = l;
    div.textContent = `第${l}課`;
    div.addEventListener("click", () => {
      const idx = selectedLessons.indexOf(l);
      if (idx >= 0) selectedLessons.splice(idx, 1);
      else selectedLessons.push(l);
      div.classList.toggle("checked");
    });
    container.appendChild(div);
  });
}

// 選択中の課の単語をまとめて取得（フィルター適用）
function getSelectedCards() {
  const sorted = [...selectedLessons].sort((a, b) => Number(a) - Number(b));
  let cards = [];
  sorted.forEach(l => { if (data[l]) cards = cards.concat(data[l]); });
  if (showStarredOnly) cards = cards.filter(c => starred.has(c.id));
  if (statusFilter !== "all") {
    if (statusFilter === "new") cards = cards.filter(c => !getStatus(c.id));
    else cards = cards.filter(c => getStatus(c.id) === statusFilter);
  }
  return cards;
}

function updateStatusCounts() {
  // 選択中の課でカウント（習熟度フィルターは無視、お気に入りのみ反映）
  const sorted = [...selectedLessons].sort((a, b) => Number(a) - Number(b));
  let allCards = [];
  sorted.forEach(l => { if (data[l]) allCards = allCards.concat(data[l]); });
  if (showStarredOnly) allCards = allCards.filter(c => starred.has(c.id));

  const counts = { all: allCards.length, new: 0, ng: 0, maybe: 0, ok: 0 };
  allCards.forEach(c => {
    const s = getStatus(c.id);
    if (!s) counts.new++;
    else counts[s]++;
  });
  document.getElementById("cnt-all").textContent = counts.all;
  document.getElementById("cnt-new").textContent = counts.new;
  document.getElementById("cnt-ng").textContent = counts.ng;
  document.getElementById("cnt-maybe").textContent = counts.maybe;
  document.getElementById("cnt-ok").textContent = counts.ok;
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.mode === mode);
  });
  document.querySelectorAll(".mode-content").forEach(c => c.classList.remove("active"));
  document.getElementById("mode-" + mode).classList.add("active");

  // autoplay表示制御（フラッシュカード時のみ）
  document.getElementById("toggle-autoplay").style.display = (mode === "flashcard") ? "inline-block" : "none";

  updateLessonTriggerLabel();
  refreshCurrentMode();
  saveState();
}

// 選択した課を確定して反映
function applyLessonSelection() {
  if (selectedLessons.length === 0) selectedLessons = [...ALL_LESSONS];
  updateLessonTriggerLabel();
  refreshCurrentMode();
  saveState();
}

function refreshCurrentMode() {
  updateStatusCounts();
  if (currentMode === "list") renderList();
  else if (currentMode === "flashcard") initFlashcard();
  else if (currentMode === "test") initTest();
}

// ========== 単語一覧モード ==========
function renderList() {
  const searchTerm = document.getElementById("search").value.trim().toLowerCase();
  const lessonsToShow = [...selectedLessons].sort((a, b) => Number(a) - Number(b));
  const content = document.getElementById("list-content");
  let totalCount = 0;
  let html = "";

  lessonsToShow.forEach(lesson => {
    let words = data[lesson].filter(w => {
      if (showStarredOnly && !starred.has(w.id)) return false;
      // 習熟度フィルター
      if (statusFilter !== "all") {
        const st = getStatus(w.id);
        if (statusFilter === "new" && st) return false;
        if (statusFilter !== "new" && st !== statusFilter) return false;
      }
      if (!searchTerm) return true;
      return w.h.toLowerCase().includes(searchTerm) ||
             w.p.toLowerCase().includes(searchTerm) ||
             w.j.toLowerCase().includes(searchTerm);
    });
    if (words.length === 0) return;
    totalCount += words.length;

    html += `<div class="lesson-section">`;
    html += `<div class="lesson-header"><span>第${lesson}課</span><span>${words.length}語</span></div>`;
    html += `<div class="word-table">`;
    html += `<div class="word-row header"><div>簡体字</div><div>ピンイン</div><div>日本語訳</div><div>操作</div></div>`;
    words.forEach((w) => {
      const isStarred = starred.has(w.id);
      const st = getStatus(w.id);
      const statusClass = st ? ` status-${st}` : "";
      html += `<div class="word-row${isStarred ? " starred" : ""}${statusClass}">
        <div class="col-hanzi">${escapeHtml(w.h)}</div>
        <div class="col-pinyin">${escapeHtml(w.p)}</div>
        <div class="col-meaning">${escapeHtml(w.j)}</div>
        <div class="col-actions">
          <div class="status-buttons">
            <button class="status-btn ng${st === "ng" ? " active" : ""}" data-id="${w.id}" data-set="ng" title="覚えてない">❌</button>
            <button class="status-btn maybe${st === "maybe" ? " active" : ""}" data-id="${w.id}" data-set="maybe" title="怪しい">⚠️</button>
            <button class="status-btn ok${st === "ok" ? " active" : ""}" data-id="${w.id}" data-set="ok" title="完璧">✅</button>
          </div>
          <button class="icon-btn star-btn${isStarred ? " starred" : ""}" data-id="${w.id}" title="お気に入り">${isStarred ? "★" : "☆"}</button>
          <button class="icon-btn" data-text="${escapeHtml(w.h)}" title="発音">🔊</button>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });

  if (totalCount === 0) {
    html = `<div class="no-results">${showStarredOnly ? "お気に入りに登録された単語がありません" : "該当する単語が見つかりませんでした"}</div>`;
    document.getElementById("summary").textContent = "";
  } else {
    const starredCount = starred.size;
    document.getElementById("summary").textContent = `全 ${totalCount} 語${searchTerm ? `（"${searchTerm}" で検索中）` : ""}${starredCount > 0 ? ` / ⭐ ${starredCount}` : ""}`;
  }
  content.innerHTML = html;

  // 発音ボタン
  content.querySelectorAll(".icon-btn:not(.star-btn)").forEach(btn => {
    btn.addEventListener("click", () => speak(btn.dataset.text, btn));
  });
  // お気に入りボタン
  content.querySelectorAll(".star-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      if (starred.has(id)) starred.delete(id);
      else starred.add(id);
      saveState();
      renderList();
    });
  });
  // ステータスボタン
  content.querySelectorAll(".status-btn").forEach(btn => {
    btn.addEventListener("click", (e) => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const newStatus = btn.dataset.set;
      // 同じステータスを再クリックで解除（未学習に戻す）
      if (getStatus(id) === newStatus) setStatus(id, null);
      else setStatus(id, newStatus);
      renderList();
    });
  });
}

document.getElementById("search").addEventListener("input", renderList);

// ========== フラッシュカードモード ==========
let fcCards = [];
let fcIndex = 0;
let fcFlipped = false;
let autoplayTimer = null;

function initFlashcard() {
  fcCards = getSelectedCards();
  fcIndex = 0;
  fcFlipped = false;
  document.getElementById("card").classList.remove("flipped");
  if (fcCards.length === 0) {
    document.getElementById("front-hanzi").textContent = "（単語なし）";
    document.getElementById("fc-progress").textContent = "0 / 0";
    document.getElementById("fc-progress-bar").style.width = "0%";
    return;
  }
  renderFlashcard();
  if (autoplay) scheduleAutoplay();
}

function renderFlashcard() {
  if (fcCards.length === 0) return;
  const c = fcCards[fcIndex];
  document.getElementById("front-hanzi").textContent = c.h;
  document.getElementById("back-pinyin").textContent = c.p;
  document.getElementById("back-meaning").textContent = c.j;
  const exHanziEl = document.getElementById("back-ex-hanzi");
  exHanziEl.childNodes[0].nodeValue = c.eh + " ";
  document.getElementById("back-ex-pinyin").textContent = c.ep;
  document.getElementById("back-ex-jp").textContent = c.ej;
  document.getElementById("fc-progress").textContent = `${fcIndex + 1} / ${fcCards.length}`;
  document.getElementById("fc-progress-bar").style.width = `${((fcIndex + 1) / fcCards.length) * 100}%`;
  document.getElementById("fc-prev").disabled = fcIndex === 0;
  document.getElementById("fc-next").disabled = fcIndex === fcCards.length - 1;
  // お気に入りボタン更新
  const starBtn = document.getElementById("fc-star");
  starBtn.textContent = starred.has(c.id) ? "★" : "☆";
  starBtn.classList.toggle("starred", starred.has(c.id));
  // ステータスボタン更新
  const st = getStatus(c.id);
  document.querySelectorAll("#mode-flashcard .card-status-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.status === st);
  });
}

function setFcStatus(status) {
  if (!fcCards[fcIndex]) return;
  const id = fcCards[fcIndex].id;
  // 同じステータス再選択で解除
  if (getStatus(id) === status) setStatus(id, null);
  else setStatus(id, status);
  // ボタン表示更新
  const st = getStatus(id);
  document.querySelectorAll("#mode-flashcard .card-status-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.status === st);
  });
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById("card").classList.toggle("flipped", fcFlipped);
  clearAutoplay();
  if (autoplay && fcFlipped) {
    // 裏面表示時、自動で発音再生
    setTimeout(() => playFcAudio('back'), 200);
    scheduleAutoplay();
  }
}

function playFcAudio(side) {
  if (!fcCards[fcIndex]) return;
  const c = fcCards[fcIndex];
  const text = side === "front" ? c.h : c.eh;
  speak(text);
}

function toggleStar() {
  if (!fcCards[fcIndex]) return;
  const c = fcCards[fcIndex];
  if (starred.has(c.id)) starred.delete(c.id);
  else starred.add(c.id);
  saveState();
  const starBtn = document.getElementById("fc-star");
  starBtn.textContent = starred.has(c.id) ? "★" : "☆";
  starBtn.classList.toggle("starred", starred.has(c.id));
}

function fcGoNext() {
  if (fcIndex < fcCards.length - 1) {
    fcIndex++;
    fcFlipped = false;
    document.getElementById("card").classList.remove("flipped");
    renderFlashcard();
    clearAutoplay();
    if (autoplay) {
      setTimeout(() => playFcAudio('front'), 200);
      scheduleAutoplay();
    }
  }
}

function fcGoPrev() {
  if (fcIndex > 0) {
    fcIndex--;
    fcFlipped = false;
    document.getElementById("card").classList.remove("flipped");
    renderFlashcard();
    clearAutoplay();
  }
}

function scheduleAutoplay() {
  clearAutoplay();
  if (!autoplay) return;
  autoplayTimer = setTimeout(() => {
    if (!fcFlipped) {
      // 表面表示中 → 裏返す
      flipCard();
    } else {
      // 裏面表示中 → 次のカードへ
      fcGoNext();
    }
  }, 4000);
}

function clearAutoplay() {
  if (autoplayTimer) { clearTimeout(autoplayTimer); autoplayTimer = null; }
}

document.getElementById("card").addEventListener("click", flipCard);
document.getElementById("fc-prev").addEventListener("click", (e) => { e.stopPropagation(); fcGoPrev(); });
document.getElementById("fc-next").addEventListener("click", (e) => { e.stopPropagation(); fcGoNext(); });
// フラッシュカードのステータスボタン
document.querySelectorAll("#mode-flashcard .card-status-btn").forEach(btn => {
  btn.addEventListener("click", (e) => { e.stopPropagation(); setFcStatus(btn.dataset.status); });
});
document.getElementById("fc-shuffle").addEventListener("click", () => {
  for (let i = fcCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcCards[i], fcCards[j]] = [fcCards[j], fcCards[i]];
  }
  fcIndex = 0;
  fcFlipped = false;
  document.getElementById("card").classList.remove("flipped");
  renderFlashcard();
});
document.getElementById("fc-reset").addEventListener("click", () => {
  fcIndex = 0;
  fcFlipped = false;
  document.getElementById("card").classList.remove("flipped");
  renderFlashcard();
});

// スワイプ操作
let touchStartX = 0, touchStartY = 0, touchMoved = false;
const fcContainer = document.getElementById("fc-container");
fcContainer.addEventListener("touchstart", (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  touchMoved = false;
}, { passive: true });
fcContainer.addEventListener("touchmove", (e) => {
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  if (Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy)) {
    touchMoved = true;
    if (dx < -30) {
      document.getElementById("swipe-left").classList.add("show");
      document.getElementById("swipe-right").classList.remove("show");
    } else if (dx > 30) {
      document.getElementById("swipe-right").classList.add("show");
      document.getElementById("swipe-left").classList.remove("show");
    }
  }
}, { passive: true });
fcContainer.addEventListener("touchend", (e) => {
  document.getElementById("swipe-left").classList.remove("show");
  document.getElementById("swipe-right").classList.remove("show");
  if (!touchMoved) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)) {
    if (dx < 0) fcGoNext();
    else fcGoPrev();
  }
});

// ========== テストモード ==========
let testCards = [];
let testIndex = 0;

function initTest() {
  testCards = getSelectedCards();
  testIndex = 0;
  resetTestCardState();
  renderTest();
  updateTestScore();
}

function resetTestCardState() {
  document.getElementById("input-hanzi").value = "";
  document.getElementById("input-pinyin").value = "";
  document.getElementById("answer-area").classList.remove("shown");
  document.getElementById("judge-buttons").classList.remove("shown");
}

function renderTest() {
  if (testCards.length === 0) {
    document.getElementById("ans-hanzi").textContent = "（単語なし）";
    document.getElementById("test-progress").textContent = "0 / 0";
    document.getElementById("test-progress-bar").style.width = "0%";
    return;
  }
  const c = testCards[testIndex];
  document.getElementById("ans-hanzi").textContent = c.h;
  document.getElementById("ans-pinyin").textContent = c.p;
  document.getElementById("ans-meaning").textContent = c.j;
  document.getElementById("ans-example").textContent = `例: ${c.eh}（${c.ep}）`;
  document.getElementById("test-progress").textContent = `${testIndex + 1} / ${testCards.length}`;
  document.getElementById("test-progress-bar").style.width = `${((testIndex + 1) / testCards.length) * 100}%`;
  document.getElementById("test-prev").disabled = testIndex === 0;
  document.getElementById("test-next").disabled = testIndex === testCards.length - 1;
}

function updateTestScore() {
  const total = scoreData.correct + scoreData.wrong;
  document.getElementById("score-correct").textContent = scoreData.correct;
  document.getElementById("score-wrong").textContent = scoreData.wrong;
  document.getElementById("score-rate").textContent = total > 0 ? `${Math.round(scoreData.correct / total * 100)}%` : "0%";
}

function playTestAudio() {
  if (!testCards[testIndex]) return;
  const c = testCards[testIndex];
  speak(c.h, document.getElementById("test-play"));
}

document.getElementById("test-play").addEventListener("click", playTestAudio);
document.getElementById("reveal-btn").addEventListener("click", () => {
  document.getElementById("answer-area").classList.add("shown");
  document.getElementById("judge-buttons").classList.add("shown");
});
document.getElementById("correct-btn").addEventListener("click", () => {
  scoreData.correct++;
  if (testCards[testIndex]) {
    const id = testCards[testIndex].id;
    if (!scoreData.perWord[id]) scoreData.perWord[id] = { c: 0, w: 0 };
    scoreData.perWord[id].c++;
    // 正解 → ステータスを一段階昇格
    //   覚えてない(ng) → 怪しい(maybe)
    //   怪しい(maybe)  → 完璧(ok)
    //   未学習/完璧     → 完璧(ok)
    const cur = getStatus(id);
    if (cur === "ng") setStatus(id, "maybe");
    else setStatus(id, "ok");
  }
  saveState();
  updateTestScore();
  goNextTest();
});
document.getElementById("wrong-btn").addEventListener("click", () => {
  scoreData.wrong++;
  if (testCards[testIndex]) {
    const id = testCards[testIndex].id;
    if (!scoreData.perWord[id]) scoreData.perWord[id] = { c: 0, w: 0 };
    scoreData.perWord[id].w++;
    // 不正解 → ステータスを「覚えてない」に、お気に入りにも追加
    setStatus(id, "ng");
    starred.add(id);
  }
  saveState();
  updateTestScore();
  goNextTest();
});

function goNextTest() {
  if (testIndex < testCards.length - 1) {
    testIndex++;
    resetTestCardState();
    renderTest();
    setTimeout(playTestAudio, 300);
  } else {
    const total = scoreData.correct + scoreData.wrong;
    alert(`お疲れさまでした！\n\n累計スコア: ${scoreData.correct} 正解 / ${scoreData.wrong} 不正解\n正答率: ${total > 0 ? Math.round(scoreData.correct / total * 100) : 0}%\n\n💡 不正解だった単語は自動的にお気に入りに登録されました。`);
  }
}

document.getElementById("test-prev").addEventListener("click", () => {
  if (testIndex > 0) { testIndex--; resetTestCardState(); renderTest(); }
});
document.getElementById("test-next").addEventListener("click", () => {
  if (testIndex < testCards.length - 1) { testIndex++; resetTestCardState(); renderTest(); }
});
document.getElementById("test-shuffle").addEventListener("click", () => {
  for (let i = testCards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [testCards[i], testCards[j]] = [testCards[j], testCards[i]];
  }
  testIndex = 0;
  resetTestCardState();
  renderTest();
});
document.getElementById("test-reset").addEventListener("click", () => {
  if (confirm("スコアをリセットしますか？")) {
    scoreData = { correct: 0, wrong: 0, perWord: {} };
    saveState();
    updateTestScore();
  }
});

// テスト入力欄でEnterキー → 答えを見る
document.getElementById("input-pinyin").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("reveal-btn").click();
});
document.getElementById("input-hanzi").addEventListener("keydown", (e) => {
  if (e.key === "Enter") document.getElementById("input-pinyin").focus();
});

// ========== オプションバーのイベント ==========
document.querySelectorAll(".mode-tab").forEach(t => {
  t.addEventListener("click", () => setMode(t.dataset.mode));
});
// 課選択パネルの開閉
document.getElementById("lesson-trigger").addEventListener("click", () => {
  const panel = document.getElementById("lesson-panel");
  const opening = !panel.classList.contains("open");
  panel.classList.toggle("open", opening);
  if (opening) renderLessonCheckboxes();
});
// 「全課」クイックボタン
document.getElementById("lesson-all").addEventListener("click", () => {
  selectedLessons = [...ALL_LESSONS];
  renderLessonCheckboxes();
});
// 「クリア」クイックボタン
document.getElementById("lesson-clear").addEventListener("click", () => {
  selectedLessons = [];
  renderLessonCheckboxes();
});
// 「決定」ボタン
document.getElementById("lesson-done").addEventListener("click", () => {
  document.getElementById("lesson-panel").classList.remove("open");
  applyLessonSelection();
});
// 速度ドロップダウン
document.getElementById("speed-select").addEventListener("change", (e) => {
  speed = parseFloat(e.target.value);
  saveState();
});
document.getElementById("toggle-starred").addEventListener("click", () => {
  showStarredOnly = !showStarredOnly;
  document.getElementById("toggle-starred").classList.toggle("on", showStarredOnly);
  refreshCurrentMode();
});
// ステータスフィルタータブ
document.querySelectorAll(".status-filter-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    statusFilter = btn.dataset.status;
    document.querySelectorAll(".status-filter-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    refreshCurrentMode();
  });
});
document.getElementById("toggle-autoplay").addEventListener("click", () => {
  autoplay = !autoplay;
  document.getElementById("toggle-autoplay").classList.toggle("on", autoplay);
  saveState();
  if (autoplay && currentMode === "flashcard") scheduleAutoplay();
  else clearAutoplay();
});

// ========== キーボードショートカット ==========
document.addEventListener("keydown", (e) => {
  // 入力欄では無効
  if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;

  // モード切替
  if (e.key === "1") { setMode("list"); e.preventDefault(); return; }
  if (e.key === "2") { setMode("flashcard"); e.preventDefault(); return; }
  if (e.key === "3") { setMode("test"); e.preventDefault(); return; }

  if (currentMode === "flashcard") {
    if (e.key === "ArrowRight") { fcGoNext(); e.preventDefault(); }
    else if (e.key === "ArrowLeft") { fcGoPrev(); e.preventDefault(); }
    else if (e.key === " " || e.key === "Spacebar") { flipCard(); e.preventDefault(); }
    else if (e.key === "p" || e.key === "P") { playFcAudio(fcFlipped ? 'back' : 'front'); e.preventDefault(); }
    else if (e.key === "s" || e.key === "S") { document.getElementById("fc-shuffle").click(); e.preventDefault(); }
    else if (e.key === "f" || e.key === "F") { toggleStar(); e.preventDefault(); }
    else if (e.key === "q" || e.key === "Q") { setFcStatus("ng"); e.preventDefault(); }
    else if (e.key === "w" || e.key === "W") { setFcStatus("maybe"); e.preventDefault(); }
    else if (e.key === "e" || e.key === "E") { setFcStatus("ok"); e.preventDefault(); }
  } else if (currentMode === "test") {
    if (e.key === " " || e.key === "Spacebar") {
      // スペースキー: まだ答えを見ていなければ「答えを見る」
      if (!document.getElementById("answer-area").classList.contains("shown")) {
        document.getElementById("reveal-btn").click();
      }
      e.preventDefault();
    }
    else if (e.key === "ArrowRight") { document.getElementById("test-next").click(); e.preventDefault(); }
    else if (e.key === "ArrowLeft") { document.getElementById("test-prev").click(); e.preventDefault(); }
    else if (e.key === "p" || e.key === "P") { playTestAudio(); e.preventDefault(); }
    else if (e.key === "s" || e.key === "S") { document.getElementById("test-shuffle").click(); e.preventDefault(); }
    else if (e.key === "c" || e.key === "C") {
      if (document.getElementById("judge-buttons").classList.contains("shown")) {
        document.getElementById("correct-btn").click(); e.preventDefault();
      }
    }
    else if (e.key === "w" || e.key === "W") {
      if (document.getElementById("judge-buttons").classList.contains("shown")) {
        document.getElementById("wrong-btn").click(); e.preventDefault();
      }
    }
  }
});

if ('speechSynthesis' in window) {

  window.speechSynthesis.getVoices();

(function setSpeedSelect() {
  const sel = document.getElementById("speed-select");
  for (const opt of sel.options) {
    if (parseFloat(opt.value) === speed) { sel.value = opt.value; break; }
  }
})();
document.getElementById("toggle-starred").classList.toggle("on", showStarredOnly);
document.getElementById("toggle-autoplay").classList.toggle("on", autoplay);
updateLessonTriggerLabel();
setMode(currentMode);
updateTestScore();
updateStatusCounts();
