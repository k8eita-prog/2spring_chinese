<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>中国語リスニングテスト</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: linear-gradient(135deg, #e0f7fa 0%, #b2dfdb 100%);
    min-height: 100vh;
    padding: 16px;
    color: #001858;
  }
  .container { max-width: 600px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 1.4rem;
    margin-bottom: 8px;
    color: #001858;
  }
  .subtitle {
    text-align: center;
    font-size: 0.85rem;
    color: #555;
    margin-bottom: 16px;
  }
  .lesson-selector {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .lesson-btn {
    flex: 1;
    min-width: 70px;
    padding: 10px 12px;
    border: 2px solid #00695c;
    background: #fff;
    color: #00695c;
    border-radius: 12px;
    font-size: 0.9rem;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lesson-btn.active {
    background: #00897b;
    color: #fff;
    border-color: #00897b;
  }
  .progress {
    text-align: center;
    margin-bottom: 12px;
    font-size: 1rem;
    font-weight: bold;
    color: #00695c;
  }
  .score {
    text-align: center;
    margin-bottom: 12px;
    font-size: 0.9rem;
    color: #555;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 24px 20px;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(0, 105, 92, 0.15);
    border: 3px solid #00897b;
    min-height: 420px;
  }
  .stage-label {
    font-size: 0.8rem;
    color: #00897b;
    font-weight: bold;
    margin-bottom: 10px;
    text-align: center;
    letter-spacing: 0.1em;
  }
  .big-play-btn {
    display: block;
    margin: 12px auto 20px;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: #00897b;
    color: #fff;
    border: none;
    font-size: 2.4rem;
    cursor: pointer;
    box-shadow: 0 6px 16px rgba(0, 137, 123, 0.4);
    transition: transform 0.15s;
  }
  .big-play-btn:active { transform: scale(0.93); }
  .speed-controls {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 16px;
  }
  .speed-btn {
    padding: 6px 14px;
    border: 2px solid #b2dfdb;
    background: #fff;
    color: #00695c;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .speed-btn.active { background: #b2dfdb; }
  .input-area {
    margin-bottom: 16px;
  }
  .input-label {
    font-size: 0.85rem;
    color: #00695c;
    font-weight: bold;
    margin-bottom: 6px;
    display: block;
  }
  .answer-input {
    width: 100%;
    padding: 12px;
    border: 2px solid #b2dfdb;
    border-radius: 10px;
    font-size: 1.1rem;
    margin-bottom: 12px;
    font-family: inherit;
  }
  .answer-input:focus {
    outline: none;
    border-color: #00897b;
  }
  .reveal-btn {
    width: 100%;
    padding: 14px;
    background: #00897b;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .reveal-btn:active { transform: scale(0.98); }
  .answer-area {
    background: #f1f8f7;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    display: none;
  }
  .answer-area.shown { display: block; }
  .answer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    padding-bottom: 10px;
    border-bottom: 1px dashed #b2dfdb;
  }
  .answer-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .answer-label {
    font-size: 0.75rem;
    color: #888;
    flex-shrink: 0;
    margin-right: 12px;
  }
  .answer-value {
    font-size: 1.1rem;
    color: #001858;
    font-weight: bold;
    text-align: right;
    flex: 1;
    word-break: break-all;
  }
  .answer-value.pinyin { color: #d81b60; }
  .answer-value.hanzi { font-size: 1.5rem; }
  .judge-buttons {
    display: none;
    gap: 8px;
    margin-bottom: 12px;
  }
  .judge-buttons.shown { display: flex; }
  .judge-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
  }
  .judge-correct { background: #66bb6a; color: #fff; }
  .judge-wrong { background: #ef5350; color: #fff; }
  .judge-btn:active { transform: scale(0.96); }
  .controls {
    display: flex;
    gap: 8px;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .ctrl-btn {
    flex: 1;
    padding: 14px 8px;
    border: none;
    background: #001858;
    color: #fff;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
  }
  .ctrl-btn:active { transform: scale(0.96); }
  .ctrl-btn:disabled { background: #aaa; cursor: not-allowed; }
  .shuffle-btn {
    width: 100%;
    padding: 12px;
    background: #d81b60;
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 8px;
  }
  .reset-btn {
    width: 100%;
    padding: 10px;
    background: #fff;
    color: #d81b60;
    border: 2px solid #d81b60;
    border-radius: 12px;
    font-size: 0.85rem;
    cursor: pointer;
  }
  .meaning-display {
    text-align: center;
    color: #555;
    font-size: 0.9rem;
    margin-top: 8px;
    font-style: italic;
  }
  @media (max-width: 400px) {
    .answer-value.hanzi { font-size: 1.3rem; }
    .big-play-btn { width: 80px; height: 80px; font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>中国語リスニングテスト</h1>
  <div class="subtitle">🎧 ピンインを聞いて、簡体字とピンインを書き取ろう</div>

  <div class="lesson-selector">
    <button class="lesson-btn active" data-lesson="1">第1課</button>
    <button class="lesson-btn" data-lesson="2">第2課</button>
    <button class="lesson-btn" data-lesson="3">第3課</button>
    <button class="lesson-btn" data-lesson="all">全課</button>
  </div>

  <div class="progress" id="progress">1 / 1</div>
  <div class="score" id="score">正解: 0 / 0</div>

  <div class="card">
    <div class="stage-label">🔊 STEP 1: 音声を聞いてください</div>
    <button class="big-play-btn" id="play-btn">▶</button>
    <div class="speed-controls">
      <button class="speed-btn" data-speed="0.6">遅い</button>
      <button class="speed-btn active" data-speed="0.85">普通</button>
      <button class="speed-btn" data-speed="1.0">速い</button>
    </div>

    <div class="input-area">
      <label class="input-label">📝 簡体字（書いて練習用）</label>
      <input type="text" class="answer-input" id="input-hanzi" placeholder="聞こえた中国語を入力...">
      <label class="input-label">📝 ピンイン（声調記号は省略OK）</label>
      <input type="text" class="answer-input" id="input-pinyin" placeholder="例: ni hao または nǐ hǎo">
    </div>

    <button class="reveal-btn" id="reveal-btn">答えを見る</button>

    <div class="answer-area" id="answer-area">
      <div class="answer-row">
        <span class="answer-label">簡体字</span>
        <span class="answer-value hanzi" id="ans-hanzi">―</span>
      </div>
      <div class="answer-row">
        <span class="answer-label">ピンイン</span>
        <span class="answer-value pinyin" id="ans-pinyin">―</span>
      </div>
      <div class="answer-row">
        <span class="answer-label">日本語訳</span>
        <span class="answer-value" id="ans-meaning">―</span>
      </div>
      <div class="meaning-display" id="ans-example">―</div>
    </div>

    <div class="judge-buttons" id="judge-buttons">
      <button class="judge-btn judge-wrong" id="wrong-btn">✗ 不正解</button>
      <button class="judge-btn judge-correct" id="correct-btn">✓ 正解</button>
    </div>
  </div>

  <div class="controls">
    <button class="ctrl-btn" id="prev-btn">← 前へ</button>
    <button class="ctrl-btn" id="next-btn">次へ →</button>
  </div>
  <button class="shuffle-btn" id="shuffle-btn">🔀 シャッフル</button>
  <button class="reset-btn" id="reset-btn">スコアをリセット</button>
</div>

<script>
const data = {
  1: [
    {h:"山田太郎",p:"Shāntián Tàiláng",j:"山田太郎",eh:"我叫山田太郎，是日本人。",ep:"Wǒ jiào Shāntián Tàiláng, shì Rìběnrén.",ej:"私は山田太郎、日本人です。"},
    {h:"所",p:"suǒ",j:"（建物などを数える）",eh:"我家附近有两所学校。",ep:"Wǒ jiā fùjìn yǒu liǎng suǒ xuéxiào.",ej:"家の近くに学校が2つあります。"},
    {h:"为了",p:"wèile",j:"〜のために",eh:"为了学好汉语，我去中国留学。",ep:"Wèile xuéhǎo Hànyǔ, wǒ qù Zhōngguó liúxué.",ej:"中国語を習得するため、中国に留学します。"},
    {h:"尽快",p:"jǐnkuài",j:"なるべく早く",eh:"请你尽快回复我。",ep:"Qǐng nǐ jǐnkuài huífù wǒ.",ej:"なるべく早く返信してください。"},
    {h:"提高",p:"tígāo",j:"高める、向上させる",eh:"我想提高我的汉语水平。",ep:"Wǒ xiǎng tígāo wǒ de Hànyǔ shuǐpíng.",ej:"中国語のレベルを上げたいです。"},
    {h:"自己",p:"zìjǐ",j:"自分",eh:"这件事我自己来做。",ep:"Zhè jiàn shì wǒ zìjǐ lái zuò.",ej:"この件は自分でやります。"},
    {h:"水平",p:"shuǐpíng",j:"レベル",eh:"他的汉语水平很高。",ep:"Tā de Hànyǔ shuǐpíng hěn gāo.",ej:"彼の中国語のレベルは高いです。"},
    {h:"打算",p:"dǎsuan",j:"〜するつもりだ",eh:"我打算明年去中国。",ep:"Wǒ dǎsuan míngnián qù Zhōngguó.",ej:"来年中国に行くつもりです。"},
    {h:"不过",p:"búguò",j:"ただし、でも",eh:"我想去，不过没有时间。",ep:"Wǒ xiǎng qù, búguò méiyǒu shíjiān.",ej:"行きたいですが、時間がありません。"},
    {h:"想好",p:"xiǎnghǎo",j:"よく考える",eh:"你想好了再决定吧。",ep:"Nǐ xiǎnghǎo le zài juédìng ba.",ej:"よく考えてから決めましょう。"},
    {h:"城市",p:"chéngshì",j:"都市、都会",eh:"北京是中国的大城市。",ep:"Běijīng shì Zhōngguó de dà chéngshì.",ej:"北京は中国の大都市です。"},
    {h:"建议",p:"jiànyì",j:"提案する、意見を出す",eh:"我建议你去北京留学。",ep:"Wǒ jiànyì nǐ qù Běijīng liúxué.",ej:"北京に留学することを提案します。"},
    {h:"历史",p:"lìshǐ",j:"歴史",eh:"中国有悠久的历史。",ep:"Zhōngguó yǒu yōujiǔ de lìshǐ.",ej:"中国には悠久の歴史があります。"},
    {h:"悠久",p:"yōujiǔ",j:"悠久である",eh:"这座城市的历史很悠久。",ep:"Zhè zuò chéngshì de lìshǐ hěn yōujiǔ.",ej:"この都市の歴史は悠久です。"},
    {h:"政治",p:"zhèngzhì",j:"政治",eh:"我对政治很感兴趣。",ep:"Wǒ duì zhèngzhì hěn gǎn xìngqù.",ej:"政治にとても興味があります。"},
    {h:"文化",p:"wénhuà",j:"文化",eh:"我喜欢中国文化。",ep:"Wǒ xǐhuan Zhōngguó wénhuà.",ej:"中国文化が好きです。"},
    {h:"中心",p:"zhōngxīn",j:"中心、センター",eh:"北京是中国的政治中心。",ep:"Běijīng shì Zhōngguó de zhèngzhì zhōngxīn.",ej:"北京は中国の政治の中心です。"},
    {h:"不但~而且~",p:"búdàn~érqiě~",j:"〜だけでなく〜",eh:"他不但会说英语，而且会说汉语。",ep:"Tā búdàn huì shuō Yīngyǔ, érqiě huì shuō Hànyǔ.",ej:"彼は英語だけでなく中国語も話せます。"},
    {h:"许多",p:"xǔduō",j:"多い、たくさん",eh:"北京有许多名胜古迹。",ep:"Běijīng yǒu xǔduō míngshèng gǔjì.",ej:"北京にはたくさんの名所旧跡があります。"},
    {h:"长城",p:"Chángchéng",j:"（万里の）長城",eh:"我想去看长城。",ep:"Wǒ xiǎng qù kàn Chángchéng.",ej:"長城を見に行きたいです。"},
    {h:"故宫",p:"Gùgōng",j:"故宮",eh:"故宫非常有名。",ep:"Gùgōng fēicháng yǒumíng.",ej:"故宮はとても有名です。"},
    {h:"颐和园",p:"Yíhéyuán",j:"頤和園",eh:"颐和园是北京的名胜。",ep:"Yíhéyuán shì Běijīng de míngshèng.",ej:"頤和園は北京の名所です。"},
    {h:"王府井大街",p:"Wángfǔjǐng dàjiē",j:"王府井大街",eh:"王府井大街很热闹。",ep:"Wángfǔjǐng dàjiē hěn rènao.",ej:"王府井大街はとても賑やかです。"},
    {h:"等",p:"děng",j:"など",eh:"我喜欢苹果、香蕉等水果。",ep:"Wǒ xǐhuan píngguǒ, xiāngjiāo děng shuǐguǒ.",ej:"リンゴ、バナナなどの果物が好きです。"},
    {h:"名胜古迹",p:"míngshèng gǔjì",j:"名所旧跡",eh:"中国有很多名胜古迹。",ep:"Zhōngguó yǒu hěn duō míngshèng gǔjì.",ej:"中国には多くの名所旧跡があります。"},
    {h:"跟~一说",p:"gēn~yì shuō",j:"〜にちょっと話すと",eh:"我跟父母一说，他们就同意了。",ep:"Wǒ gēn fùmǔ yì shuō, tāmen jiù tóngyì le.",ej:"両親に話したら、すぐ同意してくれました。"},
    {h:"父母",p:"fùmǔ",j:"父母、両親",eh:"我的父母都是老师。",ep:"Wǒ de fùmǔ dōu shì lǎoshī.",ej:"私の両親はどちらも先生です。"},
    {h:"认为",p:"rènwéi",j:"〜と考える",eh:"我认为他说得对。",ep:"Wǒ rènwéi tā shuō de duì.",ej:"彼の言う通りだと思います。"},
    {h:"选择",p:"xuǎnzé",j:"選択する、選ぶ",eh:"你的选择是对的。",ep:"Nǐ de xuǎnzé shì duì de.",ej:"あなたの選択は正しいです。"},
    {h:"参考",p:"cānkǎo",j:"参考にする",eh:"这本书可以参考。",ep:"Zhè běn shū kěyǐ cānkǎo.",ej:"この本は参考になります。"},
    {h:"决定",p:"juédìng",j:"決める、決定する",eh:"我决定去中国留学。",ep:"Wǒ juédìng qù Zhōngguó liúxué.",ej:"中国に留学することを決めました。"},
    {h:"~以后",p:"~yǐhòu",j:"〜した後",eh:"下课以后我们一起去吃饭。",ep:"Xiàkè yǐhòu wǒmen yìqǐ qù chīfàn.",ej:"授業の後、一緒にご飯を食べに行きましょう。"},
    {h:"除了~以外",p:"chúle~yǐwài",j:"〜を除いて、〜のほか",eh:"除了我以外，大家都去了。",ep:"Chúle wǒ yǐwài, dàjiā dōu qù le.",ej:"私以外、みんな行きました。"},
    {h:"利用",p:"lìyòng",j:"利用する",eh:"我想利用周末学习。",ep:"Wǒ xiǎng lìyòng zhōumò xuéxí.",ej:"週末を利用して勉強したいです。"},
    {h:"节假日",p:"jiéjiàrì",j:"祝日と休日",eh:"节假日我常常去旅游。",ep:"Jiéjiàrì wǒ chángcháng qù lǚyóu.",ej:"休日にはよく旅行に行きます。"},
    {h:"到处",p:"dàochù",j:"至る所、あちこち",eh:"北京到处都是人。",ep:"Běijīng dàochù dōu shì rén.",ej:"北京はどこも人だらけです。"},
    {h:"转",p:"zhuàn",j:"回転する、（周囲を）回る",eh:"我们去公园转转吧。",ep:"Wǒmen qù gōngyuán zhuànzhuan ba.",ej:"公園をぶらぶら散歩しましょう。"},
    {h:"品尝",p:"pǐncháng",j:"味をみる、味わう",eh:"我想品尝地道的中餐。",ep:"Wǒ xiǎng pǐncháng dìdao de zhōngcān.",ej:"本場の中華料理を味わいたいです。"},
    {h:"地道",p:"dìdao",j:"本場の、正真正銘の",eh:"这家店的中餐很地道。",ep:"Zhè jiā diàn de zhōngcān hěn dìdao.",ej:"この店の中華料理はとても本場の味です。"},
    {h:"中餐",p:"zhōngcān",j:"中華料理",eh:"我最喜欢吃中餐。",ep:"Wǒ zuì xǐhuan chī zhōngcān.",ej:"中華料理が一番好きです。"},
    {h:"另外",p:"lìngwài",j:"そのほか、それから",eh:"另外，我还想去看长城。",ep:"Lìngwài, wǒ hái xiǎng qù kàn Chángchéng.",ej:"それから、長城も見に行きたいです。"},
    {h:"期间",p:"qījiān",j:"期間、間",eh:"留学期间我学了很多。",ep:"Liúxué qījiān wǒ xué le hěn duō.",ej:"留学期間中に多くのことを学びました。"},
    {h:"学会",p:"xuéhuì",j:"マスターする、身につける",eh:"我学会了包饺子。",ep:"Wǒ xuéhuì le bāo jiǎozi.",ej:"餃子を作れるようになりました。"},
    {h:"包",p:"bāo",j:"包む、（ギョーザを）作る",eh:"妈妈在厨房包饺子。",ep:"Māma zài chúfáng bāo jiǎozi.",ej:"母は台所で餃子を作っています。"}
  ],
  2: [
    {h:"好长",p:"hǎo cháng",j:"とても長い",eh:"我等了好长时间。",ep:"Wǒ děng le hǎo cháng shíjiān.",ej:"とても長い時間待ちました。"},
    {h:"时间",p:"shíjiān",j:"時間",eh:"我没有时间。",ep:"Wǒ méiyǒu shíjiān.",ej:"時間がありません。"},
    {h:"只好",p:"zhǐhǎo",j:"しかたなく",eh:"下雨了，我只好回家。",ep:"Xiàyǔ le, wǒ zhǐhǎo huíjiā.",ej:"雨が降ったので、仕方なく帰りました。"},
    {h:"复习",p:"fùxí",j:"復習する",eh:"考试以前要好好复习。",ep:"Kǎoshì yǐqián yào hǎohǎo fùxí.",ej:"試験の前にちゃんと復習しなければなりません。"},
    {h:"忙着",p:"mángzhe",j:"〜するのに忙しい",eh:"我忙着准备考试。",ep:"Wǒ mángzhe zhǔnbèi kǎoshì.",ej:"試験の準備で忙しいです。"},
    {h:"功课",p:"gōngkè",j:"授業、宿題、勉強",eh:"今天的功课很多。",ep:"Jīntiān de gōngkè hěn duō.",ej:"今日の宿題は多いです。"},

let currentLesson = "1";
let cards = [];
let currentIndex = 0;
let speed = 0.85;
let correctCount = 0;
let answeredCount = 0;
let chineseVoice = null;
let voicesLoaded = false;

function loadChineseVoice() {
  const voices = window.speechSynthesis.getVoices();
  if (voices.length === 0) return false;
  const preferredOrder = [
    v => v.lang === "zh-CN",
    v => v.lang === "zh_CN",
    v => v.lang.toLowerCase().startsWith("cmn"),
    v => v.lang.toLowerCase().startsWith("zh-hans"),
    v => v.lang.toLowerCase().startsWith("zh"),
  ];
  for (const matcher of preferredOrder) {
    const found = voices.find(matcher);
    if (found) {
      chineseVoice = found;
      voicesLoaded = true;
      return true;
    }
  }
  voicesLoaded = true;
  return false;
}

function loadLesson(lesson) {
  currentLesson = lesson;
  if (lesson === "all") {
    cards = [...data[1], ...data[2], ...data[3]];
  } else {
    cards = [...data[lesson]];
  }
  currentIndex = 0;
  correctCount = 0;
  answeredCount = 0;
  resetCardState();
  renderCard();
  updateLessonButtons();
  updateScore();
}

function updateLessonButtons() {
  document.querySelectorAll(".lesson-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.lesson === currentLesson);
  });
}

function resetCardState() {
  document.getElementById("input-hanzi").value = "";
  document.getElementById("input-pinyin").value = "";
  document.getElementById("answer-area").classList.remove("shown");
  document.getElementById("judge-buttons").classList.remove("shown");
}

function renderCard() {
  if (cards.length === 0) return;
  const c = cards[currentIndex];
  document.getElementById("ans-hanzi").textContent = c.h;
  document.getElementById("ans-pinyin").textContent = c.p;
  document.getElementById("ans-meaning").textContent = c.j;
  document.getElementById("ans-example").textContent = `例: ${c.eh}（${c.ep}）`;
  document.getElementById("progress").textContent = `${currentIndex + 1} / ${cards.length}`;
  document.getElementById("prev-btn").disabled = currentIndex === 0;
  document.getElementById("next-btn").disabled = currentIndex === cards.length - 1;
}

function updateScore() {
  document.getElementById("score").textContent = `正解: ${correctCount} / ${answeredCount}`;
}

function playAudio() {
  if (!('speechSynthesis' in window)) {
    alert("お使いのブラウザは音声合成に対応していません。");
    return;
  }
  if (!voicesLoaded) loadChineseVoice();
  if (!chineseVoice) loadChineseVoice();
  if (!chineseVoice) {
    alert("中国語の音声が見つかりません。\n端末の設定から中国語(中文/简体)の音声データをインストールしてください。");
    return;
  }
  const c = cards[currentIndex];
  let text = c.h.replace(/[~〜～]/g, "");
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.voice = chineseVoice;
  utterance.lang = chineseVoice.lang;
  utterance.rate = speed;
  utterance.pitch = 1.0;
  window.speechSynthesis.speak(utterance);
}

document.getElementById("play-btn").addEventListener("click", playAudio);

document.querySelectorAll(".speed-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    speed = parseFloat(btn.dataset.speed);
    document.querySelectorAll(".speed-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
});

document.getElementById("reveal-btn").addEventListener("click", () => {
  document.getElementById("answer-area").classList.add("shown");
  document.getElementById("judge-buttons").classList.add("shown");
});

document.getElementById("correct-btn").addEventListener("click", () => {
  correctCount++;
  answeredCount++;
  updateScore();
  goNext();
});

document.getElementById("wrong-btn").addEventListener("click", () => {
  answeredCount++;
  updateScore();
  goNext();
});

function goNext() {
  if (currentIndex < cards.length - 1) {
    currentIndex++;
    resetCardState();
    renderCard();
    setTimeout(playAudio, 300);
  } else {
    alert(`お疲れさまでした！\n\n最終スコア: ${correctCount} / ${answeredCount}\n正答率: ${answeredCount > 0 ? Math.round(correctCount / answeredCount * 100) : 0}%`);
  }
}

document.getElementById("prev-btn").addEventListener("click", () => {
  if (currentIndex > 0) {
    currentIndex--;
    resetCardState();
    renderCard();
  }
});

document.getElementById("next-btn").addEventListener("click", () => {
  if (currentIndex < cards.length - 1) {
    currentIndex++;
    resetCardState();
    renderCard();
  }
});

document.getElementById("shuffle-btn").addEventListener("click", () => {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  currentIndex = 0;
  correctCount = 0;
  answeredCount = 0;
  resetCardState();
  renderCard();
  updateScore();
});

document.getElementById("reset-btn").addEventListener("click", () => {
  correctCount = 0;
  answeredCount = 0;
  updateScore();
});

document.querySelectorAll(".lesson-btn").forEach(btn => {
  btn.addEventListener("click", () => loadLesson(btn.dataset.lesson));
});

// 音声リスト読み込み
if ('speechSynthesis' in window) {
  loadChineseVoice();
  window.speechSynthesis.onvoiceschanged = () => loadChineseVoice();
  window.speechSynthesis.getVoices();
  setTimeout(loadChineseVoice, 500);
  setTimeout(loadChineseVoice, 1500);
}

loadLesson("1");
</script>
